---
ara_root_dir: /opt/docker/ansible-ara
ara_compose_dir: "{{ ara_root_dir }}/compose"
ara_data_dir: "{{ ara_root_dir }}/data/server"

ara_image: docker.io/recordsansible/ara-api:latest
ara_container_name: ara-server
ara_container_hostname: ara-server
ara_container_port: 8000
ara_read_login_required: false
ara_write_login_required: false

ara_nginx_image: nginx:1.27.0
ara_nginx_api_container_name: ara-nginx-api
ara_nginx_api_container_hostname: ara-nginx-api
ara_nginx_web_container_name: ara-nginx-web
ara_nginx_web_container_hostname: ara-nginx-web
ara_network_name: ansible-ara-internal
ara_compose_project_name: ansible-ara

ara_server_name: ara.lipovcan.cz
ara_public_aliases: []

# Backward compatibility: old ara_server_name maps to web endpoint.
ara_web_server_name: "{{ ara_server_name }}"
ara_web_public_aliases: "{{ ara_public_aliases }}"
ara_api_server_name: ara-api.lipovcan.cz
ara_api_public_aliases: []

ara_nginx_bind_address: 0.0.0.0
ara_api_http_port: 8088
ara_api_https_port: 8444
ara_web_http_port: 8089
ara_web_https_port: 8445
ara_enable_tls: true
ara_enable_http_redirect: false
ara_nginx_listen_ssl_only: true

ara_tls_cert_path: /opt/ssl/cert.pem
ara_tls_key_path: /opt/ssl/cert.key

ara_nginx_client_max_body_size: 64M

ara_nginx_ssl_config: |
  ssl_certificate /opt/fullchain.pem;
  ssl_certificate_key /opt/privkey.pem;

  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:20m;
  ssl_session_tickets off;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ecdh_curve X25519:prime256v1:secp384r1;
  ssl_prefer_server_ciphers off;

  ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;

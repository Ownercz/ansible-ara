---
- name: "main | 1. Validate required variables"
  ansible.builtin.assert:
    that:
      - ara_api_server_name is string
      - ara_api_server_name | length > 0
      - ara_web_server_name is string
      - ara_web_server_name | length > 0
    fail_msg: "Set ara_api_server_name and ara_web_server_name to valid public DNS names."

- name: "main | 2. Verify docker compose is available"
  ansible.builtin.command: docker compose version
  changed_when: false

- name: "main | 2.1 Validate endpoint port separation"
  ansible.builtin.assert:
    that:
      - ara_api_http_port | int != ara_web_http_port | int
      - (not ara_enable_tls) or (ara_api_https_port | int != ara_web_https_port | int)
    fail_msg: "API and WEB published ports must be different to avoid host conflicts."

- name: "main | 2.2 Build derived host and origin lists"
  ansible.builtin.set_fact:
    ara_public_hosts: >-
      {{
        ([ara_api_server_name, ara_web_server_name] + ara_api_public_aliases + ara_web_public_aliases)
        | reject('equalto', '')
        | unique
        | list
      }}
    ara_http_enabled: "{{ not (ara_enable_tls and ara_nginx_listen_ssl_only) }}"
    ara_origin_schemes: >-
      {{
        ((['https'] if ara_enable_tls else []) + (['http'] if not (ara_enable_tls and ara_nginx_listen_ssl_only) else []))
        | unique
        | list
      }}

- name: "main | 2.3 Build ARA security settings - always allowed"
  ansible.builtin.set_fact:
    ara_auto_allowed_hosts: "{{ (['127.0.0.1', 'localhost', '::1'] + ara_public_hosts) | unique | list }}"
    ara_auto_origins: "{{ ara_origin_schemes | product(ara_public_hosts) | map('join', '://') | list }}"

- name: "main | 2.4 Build ARA security settings"
  ansible.builtin.set_fact:
    ara_effective_allowed_hosts: >-
      {{
        (((ara_auto_configure_host_security | bool) | ternary(ara_auto_allowed_hosts, [])) + ara_extra_allowed_hosts)
        | unique
        | list
      }}
    ara_effective_csrf_trusted_origins: >-
      {{
        (((ara_auto_configure_host_security | bool) | ternary(ara_auto_origins, [])) + ara_extra_csrf_trusted_origins)
        | unique
        | list
      }}
    ara_effective_cors_origin_whitelist: >-
      {{
        (((ara_auto_configure_host_security | bool) | ternary(ara_auto_origins, [])) + ara_extra_cors_origin_whitelist)
        | unique
        | list
      }}

- name: "main | 3. Ensure deployment directories exist"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ ara_root_dir }}"
    - "{{ ara_compose_dir }}"
    - "{{ ara_root_dir }}/data"
    - "{{ ara_data_dir }}"
    - "{{ ara_auth_dir }}"

- name: "main | 3.1 Write API basic auth credentials"
  ansible.builtin.copy:
    dest: "{{ ara_auth_dir }}/api.htpasswd"
    content: "{{ ara_api_basic_auth_username }}:{PLAIN}{{ ara_api_basic_auth_password }}\n"
    owner: root
    group: root
    mode: "0644"
  when: ara_enable_api_basic_auth | bool

- name: "main | 3.2 Write WEB basic auth credentials"
  ansible.builtin.copy:
    dest: "{{ ara_auth_dir }}/web.htpasswd"
    content: "{{ ara_web_basic_auth_username }}:{PLAIN}{{ ara_web_basic_auth_password }}\n"
    owner: root
    group: root
    mode: "0644"
  when: ara_enable_web_basic_auth | bool

- name: "main | 4. Render compose and nginx configuration files"
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "{{ ara_compose_dir }}/{{ item }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - docker-compose.yml
    - nginx.conf
    - ara-api.conf
    - ara-web.conf
  notify: restart ansible ara stack

- name: "main | 5. Start ansible ara stack"
  ansible.builtin.command: >-
    docker compose
    --project-name {{ ara_compose_project_name }}
    -f {{ ara_compose_dir }}/docker-compose.yml
    up -d --remove-orphans
  changed_when: false
